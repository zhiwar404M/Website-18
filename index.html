<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيديو برو - منصة الفيديو الاحترافية</title>
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- ملف التنسيقات -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- الهيدر -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <i class="icon">▶️</i>
                    <span>فيديو برو</span>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="ابحث عن فيديو...">
                    <span class="search-icon">🔍</span>
                </div>
            </nav>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main>
        <div class="container">
            <!-- عنوان الصفحة -->
            <div class="page-header">
                <h1>مكتبة الفيديو</h1>
                <p>استكشف مجموعة متنوعة من الفيديوهات عالية الجودة</p>
            </div>

            <!-- شبكة البطاقات -->
            <div class="videos-grid" id="videosGrid"></div>
            <div class="no-results hidden" id="noResults">
                <p>لا توجد نتائج للبحث</p>
            </div>
        </div>
    </main>

    <!-- مودال الفيديو -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div class="video-wrapper" id="videoWrapper"></div>
            <div class="video-info" id="videoInfo"></div>
        </div>
    </div>

    <!-- جافاسكريبت -->
    <script>
        // بيانات الفيديوهات
        const videos = [
            {
                id: 1,
                title: 'فيديو اجنبية',
                thumbnail: 'https://picsum.photos/400/250?random=1',
                duration: '15:30',
                views: '١٫٢ ألف',
                uploaded: 'منذ يومين',
                description: 'س*كس و افلام اجنبية',
                videoUrl: 'https://streamtape.com/e/elB498DqQkCYR9A/'
            },
            {
                id: 2,
                title: 'فيديو اجنبية',
                thumbnail: 'https://picsum.photos/400/250?random=2',
                duration: '22:45',
                views: '٣٫٥ ألف',
                uploaded: 'منذ ٥ أيام',
                description: 'س*كس و افلام اجنبية',
                videoUrl: 'https://streamtape.com/v/kPMK6JxorxIrZk/SE-Upload_SQCGV90ZYOKR6CR.mp4'
            },
            {
                id: 3,
                title: ' فيديوو اجنبية',
                thumbnail: 'https://picsum.photos/400/250?random=3',
                duration: '18:20',
                views: '٢٫١ ألف',
                uploaded: 'منذ أسبوع',
                description: 'س*كس و افلام اجنبية',
                videoUrl: 'https://streamtape.com/e/VIDEO_ID_HERE'
            },
            {
                id: 4,
                title: 'فيديوو  اجنبية ',
                thumbnail: 'https://picsum.photos/400/250?random=4',
                duration: '25:10',
                views: '٤ آلاف',
                uploaded: 'منذ ٣ أيام',
                description: 'س*كس و افلام اجنبية',
                videoUrl: 'https://streamtape.com/e/VIDEO_ID_HERE'
            }
            
        ];

        // عرض الفيديوهات
        function displayVideos() {
            const grid = document.getElementById('videosGrid');
            const noResults = document.getElementById('noResults');
            
            if (!videos.length) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            noResults.classList.add('hidden');

            grid.innerHTML = videos.map(video => `
                <div class="video-card" data-id="${video.id}">
                    <div class="thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}">
                        <span class="duration">${video.duration}</span>
                    </div>
                    <div class="card-content">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="meta">
                            <span>👁️ ${video.views}</span>
                            <span>📅 ${video.uploaded}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // إضافة حدث النقر على البطاقات
            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const video = videos.find(v => v.id == id);
                    if (video) openModal(video);
                });
            });
        }

        // فتح المودال
        function openModal(video) {
            const modal = document.getElementById('videoModal');
            const wrapper = document.getElementById('videoWrapper');
            const info = document.getElementById('videoInfo');

            wrapper.innerHTML = `
                <iframe src="${video.videoUrl}" allowfullscreen frameborder="0"></iframe>
            `;
            info.innerHTML = `
                <h2>${video.title}</h2>
                <div class="meta-details">
                    <span>👁️ ${video.views}</span>
                    <span>⏱️ ${video.duration}</span>
                    <span>📅 ${video.uploaded}</span>
                </div>
                <p class="description">${video.description}</p>
            `;

            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // إغلاق المودال
        function closeModal() {
            const modal = document.getElementById('videoModal');
            modal.classList.remove('show');
            document.body.style.overflow = 'auto';
            document.getElementById('videoWrapper').innerHTML = '';
        }

        // البحث
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) {
                displayVideos();
                return;
            }
            const filtered = videos.filter(v => v.title.includes(term) || v.description.includes(term));
            const grid = document.getElementById('videosGrid');
            const noResults = document.getElementById('noResults');
            
            if (filtered.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                noResults.classList.add('hidden');
                grid.innerHTML = filtered.map(video => `
                    <div class="video-card" data-id="${video.id}">
                        <div class="thumbnail">
                            <img src="${video.thumbnail}" alt="${video.title}">
                            <span class="duration">${video.duration}</span>
                        </div>
                        <div class="card-content">
                            <h3 class="video-title">${video.title}</h3>
                            <div class="meta">
                                <span>👁️ ${video.views}</span>
                                <span>📅 ${video.uploaded}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('.video-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = card.dataset.id;
                        const video = filtered.find(v => v.id == id);
                        if (video) openModal(video);
                    });
                });
            }
        });

        // إغلاق عند النقر على X أو خارج المودال
        document.getElementById('closeModal').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) closeModal();
        });

        // بدء التشغيل
        displayVideos();
    </script>
</body>
</html>
