    // ============================
    // DISPLAY VIDEOS
    // ============================
    function displayVideos(list) {
        const grid = document.getElementById('videosGrid');
        const noResults = document.getElementById('noResults');

        if (!list || !list.length) {
            grid.classList.add('hidden');
            noResults.classList.remove('hidden');
            return;
        }

        grid.classList.remove('hidden');
        noResults.classList.add('hidden');

        grid.innerHTML = list.map((video, index) => {
            let adPlacement = '';
            if ((index + 1) % 4 === 0) {
                adPlacement = '<div class="ad-container ad-grid-between"><div data-banner-id="2017792"></div></div>';
            }
            return `
                <div class="video-card" data-id="${video.id}">
                    <div class="thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                        <span class="duration">${video.duration}</span>
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="card-content">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="meta">
                            <span>👁️ ${video.views}</span>
                            <span>📅 ${video.uploaded}</span>
                        </div>
                    </div>
                </div>
                ${adPlacement}
            `;
        }).join('');

        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', () => {
                const v = list.find(v => v.id == card.dataset.id);
                if (v) openModal(v);
            });
        });

        refreshAds();
    }

    // ============================
    // OPEN MODAL
    // ============================
    function openModal(video) {
        const modal = document.getElementById('videoModal');
        const wrapper = document.getElementById('videoWrapper');
        const info = document.getElementById('videoInfo');

        wrapper.innerHTML = `
            <div class="streamtape-container">
                <iframe 
                    src="${video.videoUrl}" 
                    allowfullscreen 
                    allow="autoplay; fullscreen"
                    frameborder="0"
                    scrolling="no">
                </iframe>
            </div>
        `;

        info.innerHTML = `
            <h2>${video.title}</h2>
            <div class="meta-details">
                <span>👁️ ${video.views}</span>
                <span>⏱️ ${video.duration}</span>
                <span>📅 ${video.uploaded}</span>
            </div>
            <p class="description">${video.description}</p>
        `;

        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
        setTimeout(() => refreshAds(), 500);
    }

    // ============================
    // CLOSE MODAL
    // ============================
    function closeModal() {
        const modal = document.getElementById('videoModal');
        modal.classList.remove('show');
        document.body.style.overflow = 'auto';
        document.getElementById('videoWrapper').innerHTML = '';
    }

    // ============================
    // REFRESH ADS
    // ============================
    function refreshAds() {
        try { if (typeof window.stbVolume !== 'undefined') window.stbVolume.refresh(); } catch(e) {}
        try { if (window.myBidAdsQueue) window.myBidAdsQueue.push(function() { window.myBidAds && window.myBidAds.refresh(); }); } catch(e) {}
        try { if (window._paq) window._paq.push(['trackPageView']); } catch(e) {}
    }

    // ============================
    // SEARCH
    // ============================
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.trim().toLowerCase();
        if (!term) { displayVideos(videos); return; }
        const filtered = videos.filter(v => v.title.includes(term) || v.description.includes(term));
        displayVideos(filtered);
    });

    // ============================
    // CLOSE MODAL EVENTS
    // ============================
    document.getElementById('closeModal').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    // ============================
    // INIT
    // ============================
    displayVideos(videos);
</script>

        10% { opacity: 0.5; }
        90% { opacity: 0.2; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
</style>
